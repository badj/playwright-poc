name: Playwright Tests in Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 20 * * *'  # 9:30 am NZT (UTC+12)
  workflow_dispatch:  # Allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install npm dependencies
        run: npm ci

#      Enable this step when switching to use "Run Playwright tests - CI: true" instead of "Run Playwright tests in Docker" step - runtime performance is slower than using docker runner!
#      - name: Install Playwright browsers
#        run: npx playwright install --with-deps

#      Enable this step when switching to use "Run Playwright tests - CI: true" instead of "Run Playwright tests in Docker" step - runtime performance is slower than using docker runner!
#      - name: Run Playwright tests
#        run: npx playwright test
#        env:
#          CI: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (headed)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test

      - name: Upload Monocart report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report
          path: monocart-report/
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
